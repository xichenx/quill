name: Build & Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  # ── Check version from tag ──────────────────────────────────────────
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          # Strip leading 'v' if present
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Tag: $TAG → Version: $VERSION"

  # ── Sync tag version back to source files ───────────────────────────
  sync-version:
    needs: get-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write version from tag
        run: |
          VERSION="${{ needs.get-version.outputs.version }}"

          # package.json
          cat package.json | jq ".version = \"$VERSION\"" > package.json.tmp && mv package.json.tmp package.json

          # tauri.conf.json
          cat src-tauri/tauri.conf.json | jq ".version = \"$VERSION\"" > src-tauri/tauri.conf.json.tmp && mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json

          # Cargo.toml
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml

          echo "Version synced: $VERSION"
          echo "  ✓ package.json"
          echo "  ✓ src-tauri/tauri.conf.json"
          echo "  ✓ src-tauri/Cargo.toml"

      - name: Commit & push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "chore: bump version to ${{ needs.get-version.outputs.version }}" || echo "No changes to commit"
          git push origin HEAD:main

  # ── Windows ─────────────────────────────────────────────────────────
  build-windows:
    needs: sync-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Quill v__VERSION__"
          releaseBody: |
            ## What's New

            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

            ## Downloads

            | Platform | File |
            |----------|------|
            | Windows  | `.msi` / `.exe` installer below |
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc

  # ── macOS ───────────────────────────────────────────────────────────
  build-macos:
    needs: sync-version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri (macOS)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Quill v__VERSION__"
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin

  # ── Linux ───────────────────────────────────────────────────────────
  build-linux:
    needs: sync-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri (Linux)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Quill v__VERSION__"
          releaseDraft: false
          prerelease: false
          args: --target x86_64-unknown-linux-gnu
